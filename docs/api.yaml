openapi: 3.0.0
info:
  title: PawsHaven API
  description: Official PawsHaven API documentation for animal management, veterinary services, and community engagement.
  version: 2.4.1
servers:
  - url: https://trivia-pub-about-investigation.trycloudflare.com
    description: Production Environment
  - url: http://localhost:5000
    description: Local Staging Environment
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:

  /api/health:
    get:
      summary: Get system health status
      tags: [System]
      responses:
        '200':
          description: OK

  /api/auth/register:
    post:
      summary: Create a new user account
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "John Doe" }
                email: { type: string, example: "john@example.com" }
                password: { type: string, example: "SecurePass123" }
      responses:
        '201':
          description: Created

  /api/auth/login:
    post:
      summary: Authenticate and get token
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, example: "john@example.com" }
                password: { type: string, example: "SecurePass123" }
      responses:
        '200':
          description: OK

  /api/auth/logout:
    post:
      summary: Terminate session
      tags: [Authentication]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK

  /api/users/me:
    get:
      security: [{ bearerAuth: [] }]
      summary: Retrieve current profile
      tags: [User Profile]
      responses:
        '200':
          description: OK
    put:
      security: [{ bearerAuth: [] }]
      summary: Modify profile settings
      tags: [User Profile]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
      responses:
        '200':
          description: OK

  /api/animals:
    get:
      summary: Browse animal catalog
      tags: [Pet Management]
      parameters:
        - in: query
          name: filter
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/animals/{animal_id}:
    get:
      summary: Get animal information
      tags: [Pet Management]
      parameters:
        - in: path
          name: animal_id
          required: true
          schema: { type: string, example: "YW5pbWFsXzE=" }
      responses:
        '200':
          description: OK

  /api/animals/{animal_id}/medical:
    get:
      security: [{ bearerAuth: [] }]
      summary: Retrieve medical history
      tags: [Pet Management]
      parameters:
        - in: path
          name: animal_id
          required: true
          schema: { type: string, example: "YW5pbWFsXzE=" }
      responses:
        '200':
          description: OK

  /api/animals/{animal_id}/adopt:
    post:
      security: [{ bearerAuth: [] }]
      summary: Submit adoption application
      tags: [Adoptions]
      parameters:
        - in: path
          name: animal_id
          required: true
          schema: { type: string, example: "YW5pbWFsXzE=" }
      responses:
        '201':
          description: OK

  /api/animals/search:
    get:
      summary: Search pet listings
      tags: [Pet Management]
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, example: "Golden" }
      responses:
        '200':
          description: OK

  /api/adoptions:
    get:
      security: [{ bearerAuth: [] }]
      summary: View active adoptions
      tags: [Adoptions]
      responses:
        '200':
          description: OK

  /api/adoptions/{adoption_id}/certificate:
    get:
      security: [{ bearerAuth: [] }]
      summary: Generate adoption certificate
      tags: [Adoptions]
      parameters:
        - in: path
          name: adoption_id
          required: true
          schema: { type: string, example: "YWRvcHRpb25fMQ==" }
      responses:
        '200':
          description: OK

  /api/appointments:
    get:
      security: [{ bearerAuth: [] }]
      summary: List scheduled visits
      tags: [Service Scheduling]
      responses:
        '200':
          description: OK
    post:
      security: [{ bearerAuth: [] }]
      summary: Request new appointment
      tags: [Service Scheduling]
      responses:
        '201':
          description: OK

  /api/donations:
    get:
      security: [{ bearerAuth: [] }]
      summary: View donation summary
      tags: [Donations]
      responses:
        '200':
          description: OK
    post:
      summary: Submit monetary contribution
      tags: [Donations]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: number, example: 50 }
                card_number: { type: string, example: "4242 4242 4242 4242" }
                expiry: { type: string, example: "12/25" }
                cvc: { type: string, example: "123" }
      responses:
        '200':
          description: OK

  /api/donations/receipt/{filename}:
    get:
      summary: Archive receipt retrieval
      tags: [Donations]
      parameters:
        - in: path
          name: filename
          required: true
          schema: { type: string, example: "receipt_001.pdf" }
      responses: { '200': { description: OK } }

  /api/store/coupon:
    post:
      summary: Validate promotional code
      tags: [Shop]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string, example: "SAVE10" }
      responses:
        '200':
          description: OK

  /api/store/checkout:
    post:
      summary: Complete order payment
      tags: [Shop]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: number, example: 100.00 }
                coupon_code: { type: string, example: "FREE" }
                card_number: { type: string, example: "4242 4242 4242 4242" }
                expiry: { type: string, example: "12/25" }
                cvc: { type: string, example: "123" }
      responses:
        '200':
          description: OK

  /api/store/invoice/{filename}:
    get:
      security: [{ bearerAuth: [] }]
      summary: Download purchase invoice
      tags: [Shop]
      parameters:
        - in: path
          name: filename
          required: true
          schema: { type: string, example: "invoice_001.pdf" }
      responses:
        '200':
          description: OK

  /api/store/latest-invoice:
    get:
      security: [{ bearerAuth: [] }]
      summary: Get most recent invoice
      tags: [Shop]
      responses:
        '200':
          description: OK

  /api/broadcast/check:
    get:
      summary: Check for active announcements
      tags: [System]
      responses:
        '200':
          description: OK
