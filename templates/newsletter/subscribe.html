{% extends "base.html" %}
{% block title %}Newsletter — PawsHaven{% endblock %}
{% block content %}
<div class="page-content"><div class="container-sm">
    <div class="section-header"><h1>🐾 PawsHaven Newsletter</h1><p class="text-secondary">Stay updated with rescue stories, adoption news, and shelter events.</p></div>
    <div class="card">
        <form onsubmit="subscribe(event)">
            <div class="form-group"><label class="form-label">Your Name</label><input type="text" id="nName" class="form-input" placeholder="Jane Doe" required></div>
            <div class="form-group"><label class="form-label">Email Address</label><input type="email" id="nEmail" class="form-input" placeholder="you@example.com" required></div>
            <button type="submit" id="subBtn" class="btn btn-primary btn-block btn-lg">Subscribe 📧</button>
        </form>
    </div>
    <div id="welcomeResult" class="mt-xl hidden card"></div>
</div></div>
{% endblock %}
{% block scripts %}<script>
async function subscribe(e){e.preventDefault();const btn=document.getElementById('subBtn');setLoading(btn,true);
const resp=await apiRequest('/api/newsletter/subscribe',{method:'POST',body:JSON.stringify({name:document.getElementById('nName').value,email:document.getElementById('nEmail').value})});
setLoading(btn,false);if(resp.ok){showToast('Subscribed!','success');const el=document.getElementById('welcomeResult');
el.classList.remove('hidden');el.innerHTML=resp.data.welcome_html||resp.data.message;}else showToast(resp.data.error,'error');}
</script>{% endblock %}
