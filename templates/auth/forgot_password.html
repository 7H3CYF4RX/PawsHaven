{% set hide_nav = true %}{% set hide_footer = true %}
{% extends "base.html" %}
{% block title %}Forgot Password — PawsHaven{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header"><div class="logo">🐾 PawsHaven</div><h2>Reset your password</h2><p>We'll send you a reset link</p></div>
        <div id="msg" class="alert hidden"></div>
        <form onsubmit="handleForgot(event)">
            <div class="form-group"><label class="form-label" for="email">Email Address</label><input type="email" id="email" class="form-input" placeholder="you@example.com" required></div>
            <button type="submit" id="btn" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
        </form>
        <div class="auth-footer"><a href="/login">← Back to login</a></div>
    </div>
</div>
{% endblock %}
{% block scripts %}<script>
async function handleForgot(e) { e.preventDefault(); const btn=document.getElementById('btn');const msg=document.getElementById('msg');setLoading(btn,true);
const resp=await apiRequest('/api/auth/forgot-password',{method:'POST',body:JSON.stringify({email:document.getElementById('email').value})});
setLoading(btn,false); msg.textContent=resp.data.message||'Check your email.'; msg.className='alert alert-success'; msg.classList.remove('hidden');
}</script>{% endblock %}
