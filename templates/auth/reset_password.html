{% set hide_nav = true %}{% set hide_footer = true %}
{% extends "base.html" %}
{% block title %}Reset Password — PawsHaven{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header"><div class="logo">🐾 PawsHaven</div><h2>Set new password</h2></div>
        <div id="msg" class="alert hidden"></div>
        <form onsubmit="handleReset(event)">
            <div class="form-group"><label class="form-label">New Password</label><input type="password" id="password" class="form-input" required></div>
            <button type="submit" id="btn" class="btn btn-primary btn-block btn-lg">Reset Password</button>
        </form>
        <div class="auth-footer"><a href="/login">← Back to login</a></div>
    </div>
</div>
{% endblock %}
{% block scripts %}<script>
async function handleReset(e){e.preventDefault();const params=new URLSearchParams(window.location.search);const token=params.get('token');
if(!token){document.getElementById('msg').textContent='Missing reset token.';document.getElementById('msg').className='alert alert-error';document.getElementById('msg').classList.remove('hidden');return;}
const btn=document.getElementById('btn');setLoading(btn,true);
const resp=await apiRequest('/api/auth/reset-password',{method:'POST',body:JSON.stringify({token,password:document.getElementById('password').value})});
setLoading(btn,false);const msg=document.getElementById('msg');msg.textContent=resp.data.message||resp.data.error;msg.className=resp.ok?'alert alert-success':'alert alert-error';msg.classList.remove('hidden');
}</script>{% endblock %}
