{% extends "base.html" %}
{% block title %}Contact Us — PawsHaven{% endblock %}
{% block content %}
<div class="page-content"><div class="container-sm">
    <div class="section-header"><h1>Contact Us</h1><p class="text-secondary">Have questions? We'd love to hear from you. Send us a message and we'll respond within 24-48 hours.</p></div>
    <div class="card">
        <form onsubmit="submitContact(event)">
            <div class="grid-2"><div class="form-group"><label class="form-label">Your Name</label><input type="text" id="cName" class="form-input" required placeholder="John Doe"></div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" id="cEmail" class="form-input" required placeholder="you@example.com"></div></div>
            <div class="form-group"><label class="form-label">Subject</label><input type="text" id="cSubject" class="form-input" placeholder="How can we help?"></div>
            <div class="form-group"><label class="form-label">Message</label><textarea id="cMessage" class="form-input" rows="5" required placeholder="Type your message here..."></textarea></div>
            <button type="submit" id="contactBtn" class="btn btn-primary btn-lg btn-block">Send Message 📧</button>
        </form>
    </div>
</div></div>
{% endblock %}
{% block scripts %}<script>
async function submitContact(e){e.preventDefault();const btn=document.getElementById('contactBtn');setLoading(btn,true);
const resp=await apiRequest('/api/contact',{method:'POST',body:JSON.stringify({name:document.getElementById('cName').value,email:document.getElementById('cEmail').value,subject:document.getElementById('cSubject').value,message:document.getElementById('cMessage').value})});
setLoading(btn,false);if(resp.ok){showToast(resp.data.message,'success');document.querySelector('form').reset();}else showToast(resp.data.error,'error');}
</script>{% endblock %}
